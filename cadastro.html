<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Celeste - Cadastro</title>
  <link rel="stylesheet" href="style2.css">
</head>
<body>

  <h2>Cadastro - Celeste</h2>

  <form>
    <label>Nome:</label><br>
    <input type="text" name="nome" required><br><br>

    <label>Email:</label><br>
    <input type="email" name="email" required><br><br>

    <label>Senha:</label><br>
    <input type="password" name="senha"><br><br>

    <label>Gênero:</label><br>
    <input type="radio" name="genero" value="masculino"> Masculino
    <input type="radio" name="genero" value="feminino"> Feminino<br><br>

    <label>Objetivos no jogo:</label><br>
    <input type="checkbox"> Escalar a montanha<br>
    <input type="checkbox"> Coletar morangos<br>
    <input type="checkbox"> Completar lado B<br><br>

    <button type="submit">Enviar</button>
  </form>

</body>
</html>
